name: Deno Deploy

on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@main
    with:
      project: uusd-ubq-fi
      deploy_platform: deno2
      entrypoint: serve.ts
      install_command: deno install
      build_command: deno task build
      build_env: |
        SUPABASE_URL=$SUPABASE_URL
        SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
        FRONTEND_URL=https://uusd.ubq.fi
      runtime_env: |
        STATIC_DIR=public
      include: |
        public/**
      debug_fetch_fail: true
      required_env: |
        DENO_DEPLOY_TOKEN
        SUPABASE_URL
        SUPABASE_ANON_KEY
    secrets: inherit
