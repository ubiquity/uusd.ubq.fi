name: Deno Deploy

on:
  push:
    branches-ignore:
      - dist/**
  workflow_dispatch:
  delete:

jobs:
  provision:
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        shell: bash
        run: bun install

      - name: Build app
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FRONTEND_URL: https://uusd.ubq.fi
        run: |
          set -euo pipefail

          required_keys=(SUPABASE_URL SUPABASE_ANON_KEY)
          for key in "${required_keys[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::$key is required for the Deno Deploy build."
              exit 1
            fi
          done

          bun run build

      - name: Fetch Deno deploy helper
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/ubiquity-os/deno-deploy.git "$RUNNER_TEMP/deno-deploy-action"

      - name: Resolve Deno app slug
        id: deploy-target
        shell: bash
        env:
          BASE_APP: uusd-ubq-fi
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          slugify() {
            local value="$1"
            value="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"
            printf '%s' "$value"
          }

          trim_slug() {
            local value="$1"
            local limit="$2"
            if [ "${#value}" -gt "$limit" ]; then
              value="${value:0:$limit}"
            fi
            value="$(printf '%s' "$value" | sed -E 's/-+$//')"
            printf '%s' "$value"
          }

          app_slug="$BASE_APP"
          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            suffix="$(slugify "$REF_NAME")"
            if [ -z "$suffix" ]; then
              suffix="branch"
            fi
            suffix_budget=$((32 - ${#BASE_APP} - 1))
            if [ "$suffix_budget" -gt 25 ]; then
              suffix_budget=25
            fi
            if [ "$suffix_budget" -lt 1 ]; then
              suffix_budget=1
            fi
            suffix="$(trim_slug "$suffix" "$suffix_budget")"
            if [ -z "$suffix" ]; then
              suffix="b"
            fi
            app_slug="${BASE_APP}-${suffix}"
          fi

          echo "app_slug=$app_slug" >> "$GITHUB_OUTPUT"

      - name: Provision Deno app
        shell: bash
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$DENO_DEPLOY_TOKEN" ]; then
            echo "::error::DENO_DEPLOY_TOKEN is required for Deno Deploy."
            exit 1
          fi

          action_path="$RUNNER_TEMP/deno-deploy-action"
          runtime_env_file="$RUNNER_TEMP/uusd-runtime.env"
          printf 'STATIC_DIR=public\n' > "$runtime_env_file"

          deno run \
            --allow-env \
            --allow-sys=osRelease \
            --allow-read="$action_path,$runtime_env_file,$GITHUB_WORKSPACE,/proc/version,/proc/sys/fs/binfmt_misc/WSLInterop,/run/WSL" \
            --allow-write="$GITHUB_WORKSPACE,$GITHUB_OUTPUT${GITHUB_STEP_SUMMARY:+,$GITHUB_STEP_SUMMARY}" \
            --allow-run=git,deno \
            --allow-net=api.deno.com,api.github.com,console.deno.com \
            "$action_path/scripts/provision.js" \
            --repo-root "$GITHUB_WORKSPACE" \
            --env-file "$runtime_env_file" \
            --token "$DENO_DEPLOY_TOKEN" \
            --organization ubiquity-dao \
            --github-owner "${GITHUB_REPOSITORY_OWNER}" \
            --github-repo "${GITHUB_REPOSITORY#*/}" \
            --github-token "$GITHUB_TOKEN" \
            --ref-name "${GITHUB_REF_NAME}" \
            --default-branch "${{ github.event.repository.default_branch }}" \
            --app "${{ steps.deploy-target.outputs.app_slug }}" \
            --entrypoint serve.ts \
            --build-manifest=false

  delete-branch-app:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Fetch Deno deploy helper
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth=1 https://github.com/ubiquity-os/deno-deploy.git "$RUNNER_TEMP/deno-deploy-action"

      - name: Resolve Deno app slug
        id: delete-target
        shell: bash
        env:
          BASE_APP: uusd-ubq-fi
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DELETED_REF: ${{ github.event.ref }}
        run: |
          set -euo pipefail

          slugify() {
            local value="$1"
            value="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"
            printf '%s' "$value"
          }

          trim_slug() {
            local value="$1"
            local limit="$2"
            if [ "${#value}" -gt "$limit" ]; then
              value="${value:0:$limit}"
            fi
            value="$(printf '%s' "$value" | sed -E 's/-+$//')"
            printf '%s' "$value"
          }

          app_slug="$BASE_APP"
          if [ "$DELETED_REF" != "$DEFAULT_BRANCH" ]; then
            suffix="$(slugify "$DELETED_REF")"
            if [ -z "$suffix" ]; then
              suffix="branch"
            fi
            suffix_budget=$((32 - ${#BASE_APP} - 1))
            if [ "$suffix_budget" -gt 25 ]; then
              suffix_budget=25
            fi
            if [ "$suffix_budget" -lt 1 ]; then
              suffix_budget=1
            fi
            suffix="$(trim_slug "$suffix" "$suffix_budget")"
            if [ -z "$suffix" ]; then
              suffix="b"
            fi
            app_slug="${BASE_APP}-${suffix}"
          fi

          echo "app_slug=$app_slug" >> "$GITHUB_OUTPUT"

      - name: Delete Deno branch app
        shell: bash
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$DENO_DEPLOY_TOKEN" ]; then
            echo "::error::DENO_DEPLOY_TOKEN is required for Deno Deploy cleanup."
            exit 1
          fi

          action_path="$RUNNER_TEMP/deno-deploy-action"
          deno run \
            --allow-env \
            --allow-read="$action_path" \
            --allow-net=api.deno.com,api.github.com \
            "$action_path/scripts/delete_dist_branch.js" \
            --token "$DENO_DEPLOY_TOKEN" \
            --github-owner "${GITHUB_REPOSITORY_OWNER}" \
            --github-repo "${GITHUB_REPOSITORY#*/}" \
            --github-token "$GITHUB_TOKEN" \
            --artifact-ref "dist/${{ github.event.ref }}" \
            --app "${{ steps.delete-target.outputs.app_slug }}"
