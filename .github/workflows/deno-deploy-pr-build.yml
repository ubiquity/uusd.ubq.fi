name: Deno Deploy (PR build)

on:
  pull_request:

jobs:
  build:
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install
        run: bun install

      - name: Build
        env:
          FRONTEND_URL: https://uusd.ubq.fi
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          REOWN_PROJECT_ID: ${{ secrets.REOWN_PROJECT_ID }}
        run: |
          set -euo pipefail

          # Fork PRs do not have access to repository secrets.
          if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            export SUPABASE_URL="https://wfzpewmlyiozupulbuur.supabase.co"
            export SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmenBld21seWlvenVwdWxidXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE2OTU2NzQzMzksImV4cCI6MjAxMTI1MDMzOX0.SKIL3Q0NOBaMehH0ekFspwgcu3afp3Dl9EDzPqs1nKs"
            export REOWN_PROJECT_ID=""
          fi

          bun run build

      - name: Prepare deploy artifact
        run: |
          set -euo pipefail
          rm -rf .deploy-artifact
          mkdir -p .deploy-artifact
          cp -a serve.ts .deploy-artifact/serve.ts
          cp -a public .deploy-artifact/public

          if [[ -f deno.json ]]; then cp -a deno.json .deploy-artifact/deno.json; fi
          if [[ -f deno.lock ]]; then cp -a deno.lock .deploy-artifact/deno.lock; fi

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deno-deploy-artifact
          path: .deploy-artifact
          if-no-files-found: error
